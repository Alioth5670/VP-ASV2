experiment:
  seed: 42
  device: cuda
  output_dir: ./outputs/default

model:
  use_discrepancy_filter: true
  prototype_mode: layerwise
  mask_fusion_mode: add

loss:
  name: segmentation_loss
  dice_weight: 1.0
  focal_weight: 1.0
  smooth: 1.0
  eps: 1.0e-7
  alpha: 0.25
  gamma: 2.0
  reduction: mean

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  name: cosine
  min_lr: 1.0e-5
  warmup_steps: 500

data:
  output_size: [512, 512]
  val_output_size: [512, 512]
  test_output_size: [512, 512]
  pre_resize_to_output: false
  normalize:
    enabled: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 8

train:
  batch_size: 32
  epochs: 30
  amp: true
  grad_clip: 1.0
  log_interval: -1
  val_interval: 30

inference:
  threshold: 0.5
  tta: false
